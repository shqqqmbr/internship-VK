syntax = "proto3";

package org.example.proto;

option java_package = "org.example.proto";
option java_multiple_files = true;

service KvService{
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Range(RangeRequest) returns (stream KeyValue);
  rpc Count(Empty) returns (CountResponse);
}

message PutRequest{
  string key = 1;
  bytes value = 2;
}

message PutResponse{}

message GetRequest{
  string key = 1;
}

message GetResponse{
  bytes value = 1;
}

message DeleteRequest{
  string key = 1;
}

message DeleteResponse{}

message RangeRequest{
  string key_since = 1;
  string key_to = 2;
}

message KeyValue{
  string key = 1;
  bytes value = 2;
}

message Empty{}

message CountResponse{
  int64 count = 1;
}